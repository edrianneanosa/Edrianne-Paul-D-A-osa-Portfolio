<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Section</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#060816;
      color:white;
    }

    .contact{
      width:100%;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:80px 10%;
    }

    .contact-container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:50px;
      align-items:center;
    }

    /* LEFT SIDE */

    .contact-text h1{
      font-size:60px;
      margin-bottom:20px;
      line-height:1.1;
    }

    .contact-text span{
      color:#7dd3fc;
    }

    .contact-text p{
      color:#94a3b8;
      line-height:1.8;
      margin-bottom:30px;
    }

    .info{
      margin-bottom:20px;
    }

    .info h3{
      color:#7dd3fc;
      margin-bottom:5px;
    }

    .info p{
      margin:0;
      color:#cbd5e1;
    }

    /* RIGHT SIDE */

    .contact-form{
      background:#111827;
      padding:40px;
      border-radius:25px;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 0 30px rgba(59,130,246,0.15);
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input,
    .input-box textarea{
      width:100%;
      padding:15px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#1e293b;
      color:white;
      font-size:15px;
    }

    .input-box textarea{
      resize:none;
      height:140px;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#7dd3fc;
      color:#060816;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-3px);
      box-shadow:0 0 20px rgba(125,211,252,0.5);
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .contact-text{
        text-align:center;
      }

      .contact-text h1{
        font-size:45px;
      }

    }

  </style>

</head>
<body>

  <section class="contact">

    <div class="contact-container">

      <!-- LEFT -->

      <div class="contact-text">

        <h1>Contact <span>Me</span></h1>

        <p>
          Feel free to contact me for projects,
          collaborations, or any opportunities.
        </p>

        <div class="info">
          <h3>Email</h3>
          <p>edrianneanosa@gmail.com</p>
        </div>

        <div class="info">
          <h3>Phone</h3>
          <p>+63 938 600 4054</p>
        </div>

        <div class="info">
          <h3>Location</h3>
          <p>Studied at Davao del Norte State College
 </p>
        </div>

      </div>

      <!-- RIGHT -->

      <div class="contact-form">

        <form>

          <div class="input-box">
            <input type="text" placeholder="Your Name" required>
          </div>

          <div class="input-box">
            <input type="email" placeholder="Your Email" required>
          </div>

          <div class="input-box">
            <textarea placeholder="Your Message"></textarea>
          </div>

          <button type="submit" class="btn">
            Send Message
          </button>

        </form>

      </div>

    </div>

  </section>

</body>
</html>
